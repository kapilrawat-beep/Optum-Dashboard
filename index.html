// ── Ticket origin classification
// rolled over = created before sprint start (Apr 1)
// sprint start = created on Apr 1 exactly
// added mid-sprint = created after Apr 1
function getOrigin(issue){
  const c=new Date(issue.created);
  if(c<SPRINT_START) return "rolledOver";
  if(c.toDateString()===SPRINT_START.toDateString()) return "sprintStart";
  return "midSprint";
}

// Age chart component using Chart.js
function AgeChart({issues}){
  const canvasRef=useRef(null);
  const chartRef=useRef(null);

  const devIssues=useMemo(()=>{
    const m={};
    DEVS.forEach(dev=>{
      const tickets=issues.filter(i=>i.assignee===dev&&ASSIGN_DATE[i.key]);
      if(tickets.length>0) m[dev]=tickets;
    });
    return m;
  },[issues]);

  useEffect(()=>{
    if(!canvasRef.current) return;
    if(chartRef.current) chartRef.current.destroy();

    const devs=Object.keys(devIssues);
    const green=[],amber=[],red=[];
    devs.forEach(dev=>{
      const tickets=devIssues[dev];
      let g=0,a=0,r=0;
      tickets.forEach(t=>{
        const days=daysDiff(ASSIGN_DATE[t.key]||t.created,TODAY);
        if(days>14) r++;
        else if(days>7) a++;
        else g++;
      });
      green.push(g); amber.push(a); red.push(r);
    });

    const shortNames=devs.map(d=>d.split(" ")[0]);

    chartRef.current=new Chart(canvasRef.current,{
      type:"bar",
      data:{
        labels:shortNames,
        datasets:[
          {label:"0–7d (fresh)",data:green,backgroundColor:"rgba(52,211,153,0.75)",borderColor:"rgba(52,211,153,1)",borderWidth:1},
          {label:"8–14d (aging)",data:amber,backgroundColor:"rgba(251,191,36,0.75)",borderColor:"rgba(251,191,36,1)",borderWidth:1},
          {label:"14d+ (stale)",data:red,backgroundColor:"rgba(248,113,113,0.75)",borderColor:"rgba(248,113,113,1)",borderWidth:1},
        ]
      },
      options:{
        responsive:true,
        maintainAspectRatio:false,
        plugins:{
          legend:{display:false},
          tooltip:{
            callbacks:{
              title:([item])=>devs[item.dataIndex],
              label:ctx=>`${ctx.dataset.label}: ${ctx.raw} ticket${ctx.raw!==1?"s":""}`,
            }
          }
        },
        scales:{
          x:{stacked:true,ticks:{color:"rgba(226,232,240,0.6)",font:{size:11}},grid:{color:"rgba(255,255,255,0.05)"},border:{color:"rgba(255,255,255,0.05)"}},
          y:{stacked:true,ticks:{color:"rgba(226,232,240,0.6)",font:{size:11},stepSize:1},grid:{color:"rgba(255,255,255,0.05)"},border:{color:"rgba(255,255,255,0.05)"}},
        }
      }
    });
    return()=>{if(chartRef.current)chartRef.current.destroy();};
  },[devIssues]);

  return(
    <div className="card" style={{padding:20,marginBottom:20}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
        <div style={{fontSize:13,fontWeight:700,color:"#e2e8f0"}}>Ticket age by developer</div>
        <div style={{display:"flex",gap:14}}>
          {[["#34d399","0–7d"],["#fbbf24","8–14d"],["#f87171","14d+"]].map(([c,l])=>(
            <span key={l} style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:"rgba(226,232,240,0.6)"}}>
              <span style={{width:10,height:10,borderRadius:2,background:c,display:"inline-block"}}/>
              {l}
            </span>
          ))}
        </div>
      </div>
      <div style={{position:"relative",height:220}}>
        <canvas ref={canvasRef} role="img" aria-label="Stacked bar chart showing ticket age distribution per developer"/>
      </div>
    </div>
  );
}

// Avg age per dev bar chart
function AvgAgeChart({issues}){
  const canvasRef=useRef(null);
  const chartRef=useRef(null);

  const data=useMemo(()=>{
    return DEVS.map(dev=>{
      const tickets=issues.filter(i=>i.assignee===dev&&ASSIGN_DATE[i.key]);
      if(!tickets.length) return null;
      const avg=Math.round(tickets.reduce((s,t)=>s+daysDiff(ASSIGN_DATE[t.key]||t.created,TODAY),0)/tickets.length);
      return {dev,avg,short:dev.split(" ")[0]};
    }).filter(Boolean);
  },[issues]);

  useEffect(()=>{
    if(!canvasRef.current||!data.length) return;
    if(chartRef.current) chartRef.current.destroy();
    chartRef.current=new Chart(canvasRef.current,{
      type:"bar",
      data:{
        labels:data.map(d=>d.short),
        datasets:[{
          label:"Avg age (days)",
          data:data.map(d=>d.avg),
          backgroundColor:data.map(d=>d.avg>14?"rgba(248,113,113,0.75)":d.avg>7?"rgba(251,191,36,0.75)":"rgba(52,211,153,0.75)"),
          borderColor:data.map(d=>d.avg>14?"rgba(248,113,113,1)":d.avg>7?"rgba(251,191,36,1)":"rgba(52,211,153,1)"),
          borderWidth:1,borderRadius:4,
        }]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        indexAxis:"y",
        plugins:{
          legend:{display:false},
          tooltip:{callbacks:{title:([item])=>data[item.dataIndex].dev,label:ctx=>`Avg age: ${ctx.raw}d`}}
        },
        scales:{
          x:{ticks:{color:"rgba(226,232,240,0.6)",font:{size:11},callback:v=>`${v}d`},grid:{color:"rgba(255,255,255,0.05)"},border:{color:"rgba(255,255,255,0.05)"}},
          y:{ticks:{color:"rgba(226,232,240,0.7)",font:{size:11}},grid:{display:false},border:{color:"rgba(255,255,255,0.05)"}},
        }
      }
    });
    return()=>{if(chartRef.current)chartRef.current.destroy();};
  },[data]);

  const h=Math.max(200,data.length*38+60);
  return(
    <div className="card" style={{padding:20,marginBottom:20}}>
      <div style={{fontSize:13,fontWeight:700,color:"#e2e8f0",marginBottom:14}}>Average ticket age per developer</div>
      <div style={{position:"relative",height:h}}>
        <canvas ref={canvasRef} role="img" aria-label="Horizontal bar chart showing average ticket age per developer"/>
      </div>
    </div>
  );
}

          <>
            <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search ticket or summary..." style={{width:260}}/>
              <select value={aFilter} onChange={e=>setAFilter(e.target.value)}>{assignees.map(a=><option key={a}>{a}</option>)}</select>
              <select value={sFilter} onChange={e=>setSFilter(e.target.value)}>{statuses.map(s=><option key={s}>{s}</option>)}</select>
              <span style={{fontSize:12,color:"rgba(255,255,255,0.3)"}}>{filtered.length} tickets</span>
            </div>
            <div className="card" style={{overflow:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                <thead>
                  <tr style={{borderBottom:"1px solid rgba(255,255,255,0.07)"}}>
                    {["Ticket","Summary","Assignee","Type","Priority","Status","Created","Origin"].map(h=>(
                      <th key={h} style={{padding:"11px 14px",textAlign:"left",fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:1,color:"rgba(255,255,255,0.3)",whiteSpace:"nowrap"}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {filtered.map((i,idx)=>{
                    const origin=getOrigin(i);
                    const originCfg={
                      rolledOver:{c:"#f87171",bg:"rgba(248,113,113,0.12)",label:"Rolled Over"},
                      sprintStart:{c:"#34d399",bg:"rgba(52,211,153,0.12)",label:"Sprint Start"},
                      midSprint:{c:"#fbbf24",bg:"rgba(251,191,36,0.12)",label:"Mid-Sprint"},
                    }[origin];
                    return(
                      <tr key={i.key} style={{borderBottom:"1px solid rgba(255,255,255,0.04)",background:idx%2===0?"transparent":"rgba(255,255,255,0.015)"}}
                        onMouseEnter={e=>e.currentTarget.style.background="rgba(255,90,0,0.06)"}
                        onMouseLeave={e=>e.currentTarget.style.background=idx%2===0?"transparent":"rgba(255,255,255,0.015)"}>
                        <td style={{padding:"10px 14px",whiteSpace:"nowrap"}}>
                          <a href={"https://capillarytech.atlassian.net/browse/"+i.key} target="_blank" rel="noreferrer" style={{color:"#FF5A00",fontWeight:700,fontSize:12}}>{i.key}</a>
                          {i.regression&&<span style={{marginLeft:6,background:"rgba(251,191,36,0.15)",color:"#fbbf24",fontSize:9,fontWeight:700,padding:"1px 6px",borderRadius:4,border:"1px solid rgba(251,191,36,0.3)"}}>REG</span>}
                        </td>
                        <td style={{padding:"10px 14px",maxWidth:300,color:"#cbd5e1"}}>{i.summary}</td>
                        <td style={{padding:"10px 14px",whiteSpace:"nowrap"}}>
                          <span style={{background:"rgba(255,90,0,0.1)",color:"#fb923c",padding:"2px 8px",borderRadius:20,fontSize:11,fontWeight:600}}>{i.assignee}</span>
                        </td>
                        <td style={{padding:"10px 14px",whiteSpace:"nowrap"}}><span style={{display:"inline-flex",alignItems:"center",gap:4}}><TypeIcon type={i.type}/><span style={{color:"rgba(255,255,255,0.5)",fontSize:12}}>{i.type}</span></span></td>
                        <td style={{padding:"10px 14px",whiteSpace:"nowrap"}}>
                          <span style={{display:"inline-block",width:8,height:8,borderRadius:"50%",background:PRIO_CLR[i.priority]||"#94a3b8",marginRight:5}}/>
                          <span style={{fontSize:12,color:"rgba(255,255,255,0.5)"}}>{i.priority}</span>
                        </td>
                        <td style={{padding:"10px 14px",whiteSpace:"nowrap"}}><StatusPill s={i.status}/></td>
                        <td style={{padding:"10px 14px",whiteSpace:"nowrap",color:"rgba(255,255,255,0.3)",fontSize:12}}>{i.created}</td>
                        <td style={{padding:"10px 14px",whiteSpace:"nowrap"}}>
                          <span style={{background:originCfg.bg,color:originCfg.c,padding:"3px 8px",borderRadius:8,fontSize:10,fontWeight:700,border:`1px solid ${originCfg.c}30`}}>{originCfg.label}</span>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </>
        )}

        {/* DEV DONE */}
        {tab==="devdone"&&(
          <div>
            <div style={{background:"rgba(167,139,250,0.1)",border:"1px solid rgba(167,139,250,0.25)",borderRadius:10,padding:"12px 16px",marginBottom:20,fontSize:13,color:"#c4b5fd",display:"flex",alignItems:"center",gap:8}}>
              <span>🔀</span> <strong>{devDoneCnt} tickets in Dev Done</strong> — awaiting merge and code review.
            </div>
            {devDone.map(([assignee,tickets])=>(
              <div key={assignee} className="card fade" style={{padding:20,marginBottom:16}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
                  <div style={{display:"flex",alignItems:"center",gap:12}}>
                    <div style={{width:42,height:42,borderRadius:"50%",background:"linear-gradient(135deg,#FF5A00,#7c3aed)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:800,color:"#fff"}}>
                      {assignee.split(" ").map(n=>n[0]).join("").slice(0,2)}
                    </div>
                    <div>
                      <div style={{fontWeight:700,fontSize:15,color:"#fff"}}>{assignee}</div>
                      <div style={{fontSize:12,color:"rgba(255,255,255,0.4)"}}>{tickets.length} ticket{tickets.length!==1?"s":""} ready for review</div>
                    </div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{background:"rgba(167,139,250,0.15)",border:"1px solid rgba(167,139,250,0.3)",color:"#a78bfa",padding:"5px 14px",borderRadius:20,fontSize:12,fontWeight:700}}>
                      🔍 Reviewer: {REVIEWER_MAP[assignee]||"TBD"}
                    </div>
                    <div style={{background:"rgba(251,191,36,0.15)",border:"1px solid rgba(251,191,36,0.3)",color:"#fbbf24",padding:"5px 14px",borderRadius:20,fontSize:12,fontWeight:700}}>Needs Merge ↗</div>
                  </div>
                </div>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                  <thead>
                    <tr style={{borderBottom:"1px solid rgba(255,255,255,0.06)"}}>
                      {["Ticket","Summary","Priority","Age","SP"].map(h=>(
                        <th key={h} style={{padding:"8px 12px",textAlign:"left",fontSize:10,fontWeight:700,textTransform:"uppercase",color:"rgba(255,255,255,0.25)",letterSpacing:1}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {tickets.map(t=>{
                      const assignDate=ASSIGN_DATE[t.key]||t.created;
                      const days=daysDiff(assignDate,TODAY);
                      const ab=ageBadge(days);
                      return(
                        <tr key={t.key} style={{borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
                          <td style={{padding:"9px 12px"}}><a href={"https://capillarytech.atlassian.net/browse/"+t.key} target="_blank" rel="noreferrer" style={{color:"#FF5A00",fontWeight:700,fontSize:12}}>{t.key}</a></td>
                          <td style={{padding:"9px 12px",color:"#cbd5e1",maxWidth:320}}>{t.summary}</td>
                          <td style={{padding:"9px 12px",whiteSpace:"nowrap"}}>
                            <span style={{display:"inline-block",width:7,height:7,borderRadius:"50%",background:PRIO_CLR[t.priority]||"#94a3b8",marginRight:4}}/>
                            <span style={{fontSize:11,color:"rgba(255,255,255,0.4)"}}>{t.priority}</span>
                          </td>
                          <td style={{padding:"9px 12px"}}><span style={{background:ab.bg,color:ab.c,padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:700,border:`1px solid ${ab.c}40`}}>{days}d</span></td>
                          <td style={{padding:"9px 12px"}}><span style={{background:"rgba(96,165,250,0.15)",color:"#60a5fa",padding:"2px 8px",borderRadius:8,fontSize:11,fontWeight:700}}>{SP_MAP[t.key]||2} SP</span></td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            ))}
          </div>
        )}

        {/* QA STATUS */}
        {tab==="qa"&&(
          <div>
            <div style={{background:"rgba(244,114,182,0.08)",border:"1px solid rgba(244,114,182,0.2)",borderRadius:10,padding:"12px 16px",marginBottom:20,fontSize:13,color:"#f9a8d4"}}>
              🧪 <strong>QA Team: Rashmi BR &amp; Marcy Clothier</strong>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
              {["Rashmi BR","Marcy Clothier"].map(qa=>{
                const tickets=qaTickets[qa]||[];
                const all=ISSUES.filter(i=>i.assignee===qa);
                const sc={};all.forEach(i=>{sc[i.status]=(sc[i.status]||0)+1;});
                return(
                  <div key={qa} className="card" style={{padding:22}}>
                    <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:18}}>
                      <div style={{width:46,height:46,borderRadius:"50%",background:"linear-gradient(135deg,#f472b6,#FF5A00)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,fontWeight:800,color:"#fff"}}>{qa.split(" ").map(n=>n[0]).join("").slice(0,2)}</div>
                      <div>
                        <div style={{fontWeight:800,fontSize:16,color:"#fff"}}>{qa}</div>
                        <div style={{fontSize:12,color:"rgba(255,255,255,0.4)"}}>QA Engineer · {all.length} sprint tickets</div>
                      </div>
                    </div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:16}}>
                      {Object.entries(sc).sort((a,b)=>b[1]-a[1]).map(([s,cnt])=><StatusPill key={s} s={`${s} (${cnt})`}/>)}
                    </div>
                    <div style={{borderTop:"1px solid rgba(255,255,255,0.06)",paddingTop:14}}>
                      <div style={{fontSize:12,fontWeight:700,color:"#f472b6",marginBottom:10}}>🧪 Currently In QA: {tickets.length}</div>
                      {tickets.length===0?<p style={{fontSize:13,color:"#475569"}}>No tickets In QA.</p>
                        :tickets.map(t=>(
                          <div key={t.key} style={{background:"rgba(244,114,182,0.07)",border:"1px solid rgba(244,114,182,0.15)",borderRadius:8,padding:"10px 14px",marginBottom:8}}>
                            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                              <a href={"https://capillarytech.atlassian.net/browse/"+t.key} target="_blank" rel="noreferrer" style={{color:"#FF5A00",fontWeight:700,fontSize:12}}>{t.key}</a>
                              <span style={{fontSize:10,color:"rgba(255,255,255,0.3)"}}>since {t.created}</span>
                            </div>
                            <div style={{fontSize:12,color:"#cbd5e1"}}>{t.summary}</div>
                          </div>
                        ))
                      }
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* TICKET AGE */}
        {tab==="age"&&(
          <div>
            <div style={{background:"rgba(96,165,250,0.08)",border:"1px solid rgba(96,165,250,0.2)",borderRadius:10,padding:"12px 16px",marginBottom:20,fontSize:13,color:"#93c5fd",display:"flex",alignItems:"center",gap:16,flexWrap:"wrap"}}>
              ⏱ <strong>Age is counted from when the ticket was assigned</strong> (or sprint start, whichever is later).
              {[["#34d399","0–7d"],["#fbbf24","8–14d"],["#f87171","14d+"]].map(([c,l])=>(
                <span key={l} style={{background:`${c}22`,color:c,padding:"2px 8px",borderRadius:6,fontSize:11,fontWeight:700,border:`1px solid ${c}40`}}>{l}</span>
              ))}
            </div>

            <AgeChart issues={ISSUES}/>
            <AvgAgeChart issues={ISSUES}/>

            {/* Table */}
            <div className="card" style={{overflow:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                <thead>
                  <tr style={{borderBottom:"1px solid rgba(255,255,255,0.07)"}}>
                    {["Ticket","Summary","Assignee","Status","Assigned","Age"].map(h=>(
                      <th key={h} style={{padding:"11px 14px",textAlign:"left",fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:1,color:"rgba(255,255,255,0.3)",whiteSpace:"nowrap"}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {[...ISSUES].filter(i=>DEVS.includes(i.assignee)).sort((a,b)=>daysDiff(ASSIGN_DATE[b.key]||b.created,TODAY)-daysDiff(ASSIGN_DATE[a.key]||a.created,TODAY)).map((i,idx)=>{
                    const assignDate=ASSIGN_DATE[i.key]||i.created;
                    const days=daysDiff(assignDate,TODAY);
                    const ab=ageBadge(days);
                    const barPct=Math.min(100,Math.round((days/30)*100));
                    return(
                      <tr key={i.key} style={{borderBottom:"1px solid rgba(255,255,255,0.04)",background:idx%2===0?"transparent":"rgba(255,255,255,0.015)"}}
                        onMouseEnter={e=>e.currentTarget.style.background="rgba(255,90,0,0.05)"}
                        onMouseLeave={e=>e.currentTarget.style.background=idx%2===0?"transparent":"rgba(255,255,255,0.015)"}>
                        <td style={{padding:"10px 14px"}}><a href={"https://capillarytech.atlassian.net/browse/"+i.key} target="_blank" rel="noreferrer" style={{color:"#FF5A00",fontWeight:700,fontSize:12}}>{i.key}</a></td>
                        <td style={{padding:"10px 14px",maxWidth:280,color:"#cbd5e1"}}>{i.summary}</td>
                        <td style={{padding:"10px 14px",whiteSpace:"nowrap"}}><span style={{background:"rgba(255,90,0,0.1)",color:"#fb923c",padding:"2px 8px",borderRadius:20,fontSize:11,fontWeight:600}}>{i.assignee}</span></td>
                        <td style={{padding:"10px 14px",whiteSpace:"nowrap"}}><StatusPill s={i.status}/></td>
                        <td style={{padding:"10px 14px",whiteSpace:"nowrap",color:"rgba(255,255,255,0.3)",fontSize:11}}>{assignDate}</td>
                        <td style={{padding:"10px 14px",minWidth:130}}>
                          <div style={{display:"flex",alignItems:"center",gap:8}}>
                            <div style={{flex:1,height:4,background:"rgba(255,255,255,0.06)",borderRadius:2,overflow:"hidden",minWidth:50}}>
                              <div style={{width:`${barPct}%`,height:"100%",background:ab.c,borderRadius:2,opacity:0.8}}/>
                            </div>
                            <span style={{background:ab.bg,color:ab.c,padding:"2px 8px",borderRadius:8,fontSize:11,fontWeight:700,border:`1px solid ${ab.c}40`,whiteSpace:"nowrap"}}>{days}d</span>
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        )}

        {/* REGRESSION */}
        {tab==="regression"&&(
          <div>
            <div style={{background:"rgba(251,191,36,0.08)",border:"1px solid rgba(251,191,36,0.2)",borderRadius:10,padding:"12px 16px",marginBottom:20,fontSize:13,color:"#fde68a",display:"flex",alignItems:"center",gap:8}}>
              🔄 <strong>{regressionTickets.length} Regression tickets</strong> found in Sprint 52.
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:12,marginBottom:24}}>
              {Object.entries(regressionTickets.reduce((m,i)=>{m[i.status]=(m[i.status]||0)+1;return m;},{})).map(([s,cnt])=>{
                const cfg=STATUS_CFG[s]||{c:"#94a3b8",bg:"rgba(148,163,184,0.15)"};
                return(
                  <div key={s} className="card" style={{padding:"14px 16px"}}>
                    <div style={{fontSize:22,fontWeight:800,color:cfg.c}}>{cnt}</div>
                    <div style={{fontSize:11,color:"rgba(255,255,255,0.4)",marginTop:4}}><StatusPill s={s}/></div>
                  </div>
                );
              })}
            </div>
            <div className="card" style={{overflow:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                <thead>
                  <tr style={{borderBottom:"1px solid rgba(255,255,255,0.07)"}}>
                    {["Ticket","Summary","Assignee","Type","Priority","Status","Created"].map(h=>(
                      <th key={h} style={{padding:"11px 14px",textAlign:"left",fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:1,color:"rgba(255,255,255,0.3)",whiteSpace:"nowrap"}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {regressionTickets.map((i,idx)=>(
                    <tr key={i.key} style={{borderBottom:"1px solid rgba(255,255,255,0.04)",background:idx%2===0?"transparent":"rgba(255,255,255,0.015)"}}
                      onMouseEnter={e=>e.currentTarget.style.background="rgba(251,191,36,0.05)"}
                      onMouseLeave={e=>e.currentTarget.style.background=idx%2===0?"transparent":"rgba(255,255,255,0.015)"}>
                      <td style={{padding:"10px 14px",whiteSpace:"nowrap"}}>
                        <a href={"https://capillarytech.atlassian.net/browse/"+i.key} target="_blank" rel="noreferrer" style={{color:"#FF5A00",fontWeight:700,fontSize:12}}>{i.key}</a>
                        <span style={{marginLeft:6,background:"rgba(251,191,36,0.15)",color:"#fbbf24",fontSize:9,fontWeight:700,padding:"1px 6px",borderRadius:4,border:"1px solid rgba(251,191,36,0.3)"}}>REG</span>
                      </td>
                      <td style={{padding:"10px 14px",maxWidth:340,color:"#cbd5e1"}}>{i.summary}</td>
                      <td style={{padding:"10px 14px",whiteSpace:"nowrap"}}><span style={{background:"rgba(255,90,0,0.1)",color:"#fb923c",padding:"2px 8px",borderRadius:20,fontSize:11,fontWeight:600}}>{i.assignee}</span></td>
                      <td style={{padding:"10px 14px",whiteSpace:"nowrap"}}><span style={{display:"inline-flex",alignItems:"center",gap:4}}><TypeIcon type={i.type}/><span style={{color:"rgba(255,255,255,0.4)",fontSize:12}}>{i.type}</span></span></td>
                      <td style={{padding:"10px 14px",whiteSpace:"nowrap"}}>
                        <span style={{display:"inline-block",width:7,height:7,borderRadius:"50%",background:PRIO_CLR[i.priority]||"#94a3b8",marginRight:5}}/>
                        <span style={{fontSize:12,color:"rgba(255,255,255,0.4)"}}>{i.priority}</span>
                      </td>
                      <td style={{padding:"10px 14px",whiteSpace:"nowrap"}}><StatusPill s={i.status}/></td>
                      <td style={{padding:"10px 14px",whiteSpace:"nowrap",color:"rgba(255,255,255,0.3)",fontSize:12}}>{i.created}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
