function daysDiff(from, to) {
  return Math.round((to - new Date(from)) / 86400000);
}
function ageBadge(days) {
  const bg = days > 30 ? "#fee2e2" : days > 14 ? "#fef3c7" : "#d1fae5";
  const c  = days > 30 ? "#ef4444" : days > 14 ? "#f59e0b" : "#10b981";
  return { bg, c };
}

  const cfg = STATUS_CFG[s] || { c:"#6b7280", bg:"#f3f4f6" };
  return <span style={{ background:cfg.bg, color:cfg.c, padding:"2px 9px", borderRadius:10, fontSize:11, fontWeight:700, whiteSpace:"nowrap" }}>{s}</span>;
};

            <div key={label} style={{ background:"rgba(255,255,255,0.07)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:10, padding:"12px 20px", minWidth:130 }}>
              <div style={{ fontSize:11, color:"rgba(255,255,255,0.55)", textTransform:"uppercase", letterSpacing:1 }}>{icon} {label}</div>
              <div style={{ fontSize:30, fontWeight:800, marginTop:4, color:"#FF5A00" }}>{val}</div>
            </div>
          ))}
        </div>
      </div>

      {/* TABS */}
      <div style={{ display:"flex", borderBottom:"2px solid #e2e8f0", background:"#fff", padding:"0 32px", overflowX:"auto" }}>
        {TABS.map(([key,label])=>(
          <button key={key} onClick={()=>setTab(key)} style={{
            border:"none", background:"none", padding:"14px 18px", fontSize:13, fontWeight:600, cursor:"pointer", whiteSpace:"nowrap",
            color:tab===key?"#FF5A00":"#64748b",
            borderBottom:tab===key?"2px solid #FF5A00":"2px solid transparent",
            marginBottom:-2,
          }}>{label}</button>
        ))}
      </div>

      <div style={{ padding:"24px 32px" }}>

        {/* ── TAB 1: ALL TICKETS ── */}
        {tab==="tickets" && (
          <>
            <div style={{ display:"flex", gap:10, marginBottom:18, flexWrap:"wrap", alignItems:"center" }}>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search ticket or summary..."
                style={{ padding:"8px 14px", borderRadius:8, border:"1px solid #cbd5e1", fontSize:13, width:260, outline:"none" }} />
              <select value={aFilter} onChange={e=>setAFilter(e.target.value)}
                style={{ padding:"8px 12px", borderRadius:8, border:"1px solid #cbd5e1", fontSize:13 }}>
                {assignees.map(a=><option key={a}>{a}</option>)}
              </select>
              <select value={sFilter} onChange={e=>setSFilter(e.target.value)}
                style={{ padding:"8px 12px", borderRadius:8, border:"1px solid #cbd5e1", fontSize:13 }}>
                {statuses.map(s=><option key={s}>{s}</option>)}
              </select>
              <span style={{ fontSize:12, color:"#64748b" }}>{filtered.length} tickets</span>
            </div>
            <div style={{ background:"#fff", borderRadius:12, border:"1px solid #e2e8f0", overflow:"auto" }}>
              <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
                <thead>
                  <tr style={{ background:"#1A1A1A", color:"#fff" }}>
                    {["Ticket","Summary","Assignee","Type","Priority","Status","Created"].map(h=>(
                      <th key={h} style={{ padding:"11px 14px", textAlign:"left", fontSize:11, fontWeight:700, textTransform:"uppercase", letterSpacing:0.8, whiteSpace:"nowrap" }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {filtered.map((i,idx)=>(
                    <tr key={i.key}
                      style={{ background:idx%2===0?"#fff":"#f8fafc", borderBottom:"1px solid #f1f5f9" }}
                      onMouseEnter={e=>e.currentTarget.style.background="#fff7f0"}
                      onMouseLeave={e=>e.currentTarget.style.background=idx%2===0?"#fff":"#f8fafc"}>
                      <td style={{ padding:"10px 14px", whiteSpace:"nowrap" }}>
                        <a href={"https://capillarytech.atlassian.net/browse/"+i.key} target="_blank" rel="noreferrer"
                          style={{ color:"#FF5A00", fontWeight:700, fontSize:12, textDecoration:"none" }}>{i.key}</a>
                      </td>
                      <td style={{ padding:"10px 14px", maxWidth:340, color:"#1e293b", lineHeight:1.4 }}>{i.summary}</td>
                      <td style={{ padding:"10px 14px", whiteSpace:"nowrap" }}>
                        {i.assignee==="Unassigned"
                          ? <span style={{ color:"#94a3b8", fontStyle:"italic" }}>Unassigned</span>
                          : <span style={{ background:"#fff3ee", color:"#FF5A00", padding:"2px 9px", borderRadius:12, fontSize:11, fontWeight:600 }}>{i.assignee}</span>}
                      </td>
                      <td style={{ padding:"10px 14px", whiteSpace:"nowrap" }}>{TYPE_ICON[i.type]||"📌"} {i.type}</td>
                      <td style={{ padding:"10px 14px", whiteSpace:"nowrap" }}>
                        <span style={{ display:"inline-block", width:8, height:8, borderRadius:"50%", background:PRIO_CLR[i.priority]||"#9ca3af", marginRight:5 }}/>
                        {i.priority}
                      </td>
                      <td style={{ padding:"10px 14px", whiteSpace:"nowrap" }}><StatusBadge s={i.status}/></td>
                      <td style={{ padding:"10px 14px", whiteSpace:"nowrap", color:"#64748b" }}>{i.created}</td>
                    </tr>
                  ))}
                  {filtered.length===0 && <tr><td colSpan={7} style={{ textAlign:"center", padding:40, color:"#94a3b8" }}>No tickets found.</td></tr>}
                </tbody>
              </table>
            </div>
          </>
        )}

        {/* ── TAB 2: DEV DONE & MERGE REVIEW ── */}
        {tab==="devdone" && (
          <div>
            <div style={{ background:"#fff3ee", border:"1px solid #ffcba4", borderRadius:10, padding:"14px 18px", marginBottom:20, fontSize:13, color:"#92400e" }}>
              <strong>🔀 {devDoneCnt} tickets in Dev Done</strong> — These are ready to be merged and reviewed. Below is the breakdown per team member.
            </div>
            {devDone.length===0
              ? <p style={{ color:"#94a3b8" }}>No tickets currently in Dev Done.</p>
              : devDone.map(([assignee, tickets])=>(
                <div key={assignee} style={{ background:"#fff", border:"1px solid #e2e8f0", borderRadius:12, padding:20, marginBottom:16 }}>
                  <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:14 }}>
                    <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                      <div style={{ width:38, height:38, borderRadius:"50%", background:"linear-gradient(135deg,#FF5A00,#1A1A1A)", color:"#fff", display:"flex", alignItems:"center", justifyContent:"center", fontSize:13, fontWeight:800 }}>
                        {assignee.split(" ").map(n=>n[0]).join("").slice(0,2).toUpperCase()}
                      </div>
                      <div>
                        <div style={{ fontWeight:700, fontSize:15, color:"#1e293b" }}>{assignee}</div>
                        <div style={{ fontSize:12, color:"#64748b" }}>{tickets.length} ticket{tickets.length!==1?"s":""} in Dev Done</div>
                      </div>
                    </div>
                    <div style={{ background:"#ede9fe", color:"#7c3aed", padding:"4px 14px", borderRadius:20, fontSize:12, fontWeight:700 }}>
                      Needs Merge &amp; Review
                    </div>
                  </div>
                  <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
                    <thead>
                      <tr style={{ background:"#f8fafc" }}>
                        {["Ticket","Summary","Priority","Age"].map(h=>(
                          <th key={h} style={{ padding:"8px 12px", textAlign:"left", fontSize:11, fontWeight:700, textTransform:"uppercase", color:"#64748b", borderBottom:"1px solid #e2e8f0" }}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {tickets.map(t=>{
                        const days = daysDiff(t.created, TODAY);
                        const ab = ageBadge(days);
                        return (
                          <tr key={t.key} style={{ borderBottom:"1px solid #f1f5f9" }}>
                            <td style={{ padding:"9px 12px" }}>
                              <a href={"https://capillarytech.atlassian.net/browse/"+t.key} target="_blank" rel="noreferrer"
                                style={{ color:"#FF5A00", fontWeight:700, fontSize:12, textDecoration:"none" }}>{t.key}</a>
                            </td>
                            <td style={{ padding:"9px 12px", color:"#1e293b" }}>{t.summary}</td>
                            <td style={{ padding:"9px 12px" }}>
                              <span style={{ display:"inline-block", width:8, height:8, borderRadius:"50%", background:PRIO_CLR[t.priority]||"#9ca3af", marginRight:4 }}/>
                              {t.priority}
                            </td>
                            <td style={{ padding:"9px 12px" }}>
                              <span style={{ background:ab.bg, color:ab.c, padding:"2px 9px", borderRadius:10, fontSize:11, fontWeight:700 }}>{days}d</span>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              ))
            }
          </div>
        )}

        {/* ── TAB 3: QA STATUS ── */}
        {tab==="qa" && (
          <div>
            <div style={{ background:"#fce7f3", border:"1px solid #f9a8d4", borderRadius:10, padding:"14px 18px", marginBottom:20, fontSize:13, color:"#831843" }}>
              <strong>🧪 QA Team:</strong> Rashmi BR and Marcy Clothier are the QA members for this sprint. Below shows their current In QA workload.
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:20 }}>
              {QA_TEAM.map(qa => {
                const tickets = qaTickets[qa] || [];
                const allTickets = ISSUES.filter(i=>i.assignee===qa);
                const statCounts = {};
                allTickets.forEach(i=>{ statCounts[i.status]=(statCounts[i.status]||0)+1; });
                return (
                  <div key={qa} style={{ background:"#fff", border:"1px solid #e2e8f0", borderRadius:12, padding:20 }}>
                    <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:16 }}>
                      <div style={{ width:44, height:44, borderRadius:"50%", background:"linear-gradient(135deg,#ec4899,#FF5A00)", color:"#fff", display:"flex", alignItems:"center", justifyContent:"center", fontSize:15, fontWeight:800 }}>
                        {qa.split(" ").map(n=>n[0]).join("").slice(0,2)}
                      </div>
                      <div>
                        <div style={{ fontWeight:800, fontSize:16, color:"#1e293b" }}>{qa}</div>
                        <div style={{ fontSize:12, color:"#64748b" }}>QA Engineer &middot; {allTickets.length} total tickets</div>
                      </div>
                    </div>
                    {/* Status summary */}
                    <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom:16 }}>
                      {Object.entries(statCounts).sort((a,b)=>b[1]-a[1]).map(([s,cnt])=>{
                        const cfg = STATUS_CFG[s]||{c:"#6b7280",bg:"#f3f4f6"};
                        return <span key={s} style={{ background:cfg.bg, color:cfg.c, padding:"2px 9px", borderRadius:10, fontSize:11, fontWeight:600 }}>{s} ({cnt})</span>;
                      })}
                    </div>
                    {/* In QA tickets */}
                    <div style={{ borderTop:"1px solid #f1f5f9", paddingTop:14 }}>
                      <div style={{ fontSize:12, fontWeight:700, color:"#ec4899", marginBottom:10 }}>
                        🧪 Currently In QA: {tickets.length} ticket{tickets.length!==1?"s":""}
                      </div>
                      {tickets.length===0
                        ? <p style={{ fontSize:13, color:"#94a3b8" }}>No tickets currently In QA.</p>
                        : tickets.map(t=>(
                          <div key={t.key} style={{ background:"#fce7f3", borderRadius:8, padding:"10px 14px", marginBottom:8 }}>
                            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                              <a href={"https://capillarytech.atlassian.net/browse/"+t.key} target="_blank" rel="noreferrer"
                                style={{ color:"#FF5A00", fontWeight:700, fontSize:12, textDecoration:"none" }}>{t.key}</a>
                              <span style={{ fontSize:11, color:"#9f1239" }}>created {t.created}</span>
                            </div>
                            <div style={{ fontSize:12, color:"#1e293b", marginTop:4 }}>{t.summary}</div>
                          </div>
                        ))
                      }
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* ── TAB 4: TICKET AGE ── */}
        {tab==="age" && (
          <div>
            <div style={{ background:"#e0f2fe", border:"1px solid #7dd3fc", borderRadius:10, padding:"14px 18px", marginBottom:20, fontSize:13, color:"#0c4a6e" }}>
              <strong>⏱ Age = days since ticket was created until today (Apr 9, 2026).</strong> &nbsp;
              <span style={{ background:"#d1fae5", color:"#065f46", padding:"1px 8px", borderRadius:8, fontSize:11, fontWeight:700, marginRight:6 }}>0-14d</span>
              <span style={{ background:"#fef3c7", color:"#92400e", padding:"1px 8px", borderRadius:8, fontSize:11, fontWeight:700, marginRight:6 }}>15-30d</span>
              <span style={{ background:"#fee2e2", color:"#991b1b", padding:"1px 8px", borderRadius:8, fontSize:11, fontWeight:700 }}>30d+</span>
            </div>
            <div style={{ background:"#fff", borderRadius:12, border:"1px solid #e2e8f0", overflow:"auto" }}>
              <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
                <thead>
                  <tr style={{ background:"#1A1A1A", color:"#fff" }}>
                    {["Ticket","Summary","Assignee","Status","Created","Age"].map(h=>(
                      <th key={h} style={{ padding:"11px 14px", textAlign:"left", fontSize:11, fontWeight:700, textTransform:"uppercase", letterSpacing:0.8, whiteSpace:"nowrap" }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {[...ISSUES].sort((a,b)=>daysDiff(b.created,TODAY)-daysDiff(a.created,TODAY)).map((i,idx)=>{
                    const days = daysDiff(i.created, TODAY);
                    const ab = ageBadge(days);
                    return (
                      <tr key={i.key}
                        style={{ background:idx%2===0?"#fff":"#f8fafc", borderBottom:"1px solid #f1f5f9" }}
                        onMouseEnter={e=>e.currentTarget.style.background="#eff6ff"}
                        onMouseLeave={e=>e.currentTarget.style.background=idx%2===0?"#fff":"#f8fafc"}>
                        <td style={{ padding:"10px 14px" }}>
                          <a href={"https://capillarytech.atlassian.net/browse/"+i.key} target="_blank" rel="noreferrer"
                            style={{ color:"#FF5A00", fontWeight:700, fontSize:12, textDecoration:"none" }}>{i.key}</a>
                        </td>
                        <td style={{ padding:"10px 14px", maxWidth:320, color:"#1e293b" }}>{i.summary}</td>
                        <td style={{ padding:"10px 14px", whiteSpace:"nowrap" }}>
                          {i.assignee==="Unassigned"
                            ? <span style={{ color:"#94a3b8", fontStyle:"italic" }}>Unassigned</span>
                            : <span style={{ background:"#fff3ee", color:"#FF5A00", padding:"2px 8px", borderRadius:10, fontSize:11, fontWeight:600 }}>{i.assignee}</span>}
                        </td>
                        <td style={{ padding:"10px 14px", whiteSpace:"nowrap" }}><StatusBadge s={i.status}/></td>
                        <td style={{ padding:"10px 14px", whiteSpace:"nowrap", color:"#64748b" }}>{i.created}</td>
                        <td style={{ padding:"10px 14px", whiteSpace:"nowrap" }}>
                          <span style={{ background:ab.bg, color:ab.c, padding:"3px 12px", borderRadius:10, fontSize:12, fontWeight:700 }}>{days} days</span>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
